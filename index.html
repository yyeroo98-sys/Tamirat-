<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tammu Player</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

    <div class="logo">
        <h1>Tammu Player</h1>
        <p>Video & Music Player</p>
    </div>

    <div class="search-box">
        <input
            type="search"
            id="searchInput"
            placeholder="Search videos, music...">
    </div>

    <div class="header-buttons">

        <button id="notificationBtn">
            🔔
        </button>

        <button id="settingsBtn">
            ⚙️
        </button>

    </div>

</header>

<nav class="navigation">

    <ul>

        <li><a href="#" id="homeMenu">🏠 Home</a></li>

        <li><a href="#" id="videoMenu">🎥 Videos</a></li>

        <li><a href="#" id="musicMenu">🎵 Music</a></li>

        <li><a href="#" id="folderMenu">📂 Folders</a></li>

        <li><a href="#" id="favoriteMenu">⭐ Favorites</a></li>

        <li><a href="#" id="historyMenu">🕒 History</a></li>

    </ul>

</nav>

<main id="mainContent">

<section class="player-container">

    <video
        id="videoPlayer"
        controls
        preload="metadata"
        playsinline>
        Browser kee video hin deeggartu.
    </video>

</section>

<section class="media-picker">

    <h2>Open Media</h2>

    <input
        type="file"
        id="mediaFile"
        accept="video/*,audio/*"
        multiple>

</section>

<section class="player-controls">

    <button id="previousBtn">⏮</button>

    <button id="rewindBtn">⏪ 10s</button>

    <button id="playBtn">▶</button>

    <button id="pauseBtn">⏸</button>

    <button id="stopBtn">⏹</button>

    <button id="forwardBtn">10s ⏩</button>

    <button id="nextBtn">⏭</button>

</section>

<section class="progress-container">

    <span id="currentTime">00:00</span>

    <input
        type="range"
        id="progressBar"
        min="0"
        max="100"
        value="0">

    <span id="totalTime">00:00</span>

</section>

<section class="volume-container">

    <label for="volumeSlider">🔊 Volume</label>

    <input
        type="range"
        id="volumeSlider"
        min="0"
        max="1"
        step="0.01"
        value="1">

</section>

<section class="speed-container">

    <label for="playbackSpeed">Playback Speed</label>

    <select id="playbackSpeed">

        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1× Normal</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>

    </select>

</section>

<section class="playlist-container">

    <h2>Playlist</h2>

    <ul id="playlist">

        <li>No media selected.</li>

    </ul>

</section>

<section class="subtitle-container">

    <label for="subtitleFile">Subtitle (.srt)</label>

    <input
        type="file"
        id="subtitleFile"
        accept=".srt,.vtt">

</section>

<section class="video-options">

    <button id="fullscreenBtn">⛶ Full Screen</button>

    <button id="pipBtn">📺 Picture in Picture</button>

    <button id="rotateBtn">🔄 Rotate</button>

    <button id="lockBtn">🔒 Lock Screen</button>

</section>

<section class="equalizer-container">

    <h2>Equalizer</h2>

    <button id="bassBtn">Bass Boost</button>

    <button id="surroundBtn">Surround</button>

    <button id="normalBtn">Normal</button>

</section>

<section class="video-info">

    <h2>Media Information</h2>

    <p><strong>Name:</strong> <span id="mediaName">-</span></p>

    <p><strong>Duration:</strong> <span id="mediaDuration">00:00</span></p>

    <p><strong>Resolution:</strong> <span id="mediaResolution">-</span></p>

    <p><strong>Format:</strong> <span id="mediaFormat">-</span></p>

</section>

<footer class="bottom-navigation">

    <button id="homeBtn">🏠</button>

    <button id="libraryBtn">📂</button>

    <button id="musicBtn">🎵</button>

    <button id="favoriteBtn">⭐</button>

    <button id="profileBtn">👤</button>

</footer>

</main>

<script src="script.js"></script>

</body>
</html>
